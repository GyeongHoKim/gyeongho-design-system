name: Release

# Gate the release on CI: only run after the CI workflow completes successfully
# on main. This keeps a red main commit from ever cutting a version (or, once
# enabled, a publish). See the `if:` guard on the job below.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write       # changeset version commit + tags
  pull-requests: write  # open/update the Version Packages PR
  id-token: write       # npm OIDC trusted publishing (no NPM_TOKEN needed)

jobs:
  release:
    name: version + publish (OIDC)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup

      # When changesets exist: opens/updates a "Version Packages" PR (bumps
      # versions + changelogs). When none remain (i.e. that PR was merged):
      # runs `pnpm run release` (turbo build + changeset publish) which publishes
      # to npm via OIDC trusted publishing — no NPM_TOKEN, provenance automatic.
      #
      # KNOWN LIMITATION: the version PR is authored with the default GITHUB_TOKEN,
      # and GitHub does not trigger workflows for token-authored events — so CI
      # does NOT run on the "Version Packages" PR itself. Supply a PAT/app token
      # as `GITHUB_TOKEN` below if you want that PR to run CI.
      - name: Changesets — version PR / publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
