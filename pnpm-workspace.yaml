packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  typescript: ^7.0.0
  tsdown: ^0.19.0
  vitest: ^3.0.0
  '@vitest/browser': ^3.0.0
  playwright: ^1.61.0
  '@types/node': ^24.0.0
  chromatic: ^17.8.0
  lit: ^3.2.1
  '@fontsource-variable/noto-sans-kr': ^5.2.10
  '@fontsource-variable/nunito-sans': ^5.2.7
  '@fontsource/gaegu': ^5.2.8
  '@fontsource/gochi-hand': ^5.2.8
  '@fontsource/pretendard': ^5.2.5

# pnpm v11: `allowBuilds` replaces the deprecated `onlyBuiltDependencies`.
# Without it, esbuild's postinstall is ignored and a clean install (CI) fails
# with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  '@bundled-es-modules/glob': true
  '@swc/core': true
  esbuild: true
  sharp: true
  style-dictionary: true

minimumReleaseAge: 180
